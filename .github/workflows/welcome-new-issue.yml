name: Welcome new issue

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '👋 感谢你的反馈！我们已经收到。',
              '',
              '- 维护者会在 **3 个工作日内** 给出首次响应。',
              '- 期间状态保持为 `status: 待评估`，你可以随时补充信息。',
              '- 如果信息不全，我们会打上 `needs: 更多信息` 标签并 @ 你。',
              '',
              '---',
              '',
              '👋 Thanks for the feedback! We\'ve received your issue.',
              '',
              '- A maintainer will respond within **3 business days**.',
              '- Status will remain `status: 待评估` (Triage) until then; feel free to add more context.',
              '- If we need more details, we\'ll add a `needs: 更多信息` label and ping you.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
