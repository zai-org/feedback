name: 💡 功能建议 · Feature Request
description: 为 ZCode 提出新功能或体验优化建议 · Suggest a new feature or UX improvement
title: "[建议 / Feature] "
labels: ["type: 功能建议", "status: 待评估"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 ZCode 提建议！请尽量完整填写以下信息，方便我们快速评估。
        Thanks for your suggestion! Filling this out completely helps us evaluate quickly.

  - type: checkboxes
    id: prechecks
    attributes:
      label: 提交前确认 · Pre-submission checklist
      options:
        - label: 我已搜索过现有 issue，确认这不是重复提议 / I searched existing issues and confirmed this isn't a duplicate.
          required: true
        - label: 我已阅读 [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) / I've read CONTRIBUTING.md.
          required: true

  - type: dropdown
    id: category
    attributes:
      label: 问题类别 · Category
      description: 这个建议主要属于哪类？/ Which area does this fall under?
      options:
        - "UI / 界面体验 · UI / UX"
        - "性能 · Performance (延迟 / 卡顿 / 资源占用)"
        - "稳定性 / 崩溃 · Stability / Crash"
        - "对话 / Agent 交互 · Agent chat / interaction"
        - "工具调用 / MCP · Tool use / MCP"
        - "文件 / 项目操作 · File / Project ops"
        - "模型设置 / 切换 · Model config / switching"
        - "账号 / 登录 · Account / Login"
        - "计费 / 配额 · Billing / Quota"
        - "文档 / 教程 · Docs / Tutorials"
        - "其他 / 不确定 · Other / Not sure"
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: 涉及的 Agent 框架 · Agent framework
      description: 这条建议是针对哪个框架的？不涉及具体框架可选"通用"。/ Which integrated framework does this concern?
      options:
        - "ZCode Agent（自研）"
        - "Claude Code"
        - "Codex"
        - "opencode"
        - "Gemini CLI"
        - "多个 / 通用 · Multiple / General"
        - "不涉及框架 · Not framework-specific"
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景 · Use case
      description: 你在什么情况下遇到这个需求？现在是怎么做的？有什么不方便？/ What were you doing? How do you do it now? What's frustrating?
      placeholder: |
        例 / e.g.:
        每次我导出报表时，都要手动切换 5 次筛选条件……
        Whenever I export a report, I have to switch filters five times…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 · Proposal
      description: 你希望产品怎么改进？/ How should the product change?
      placeholder: |
        例 / e.g.:
        在导出弹窗记住上次的筛选选择……
        Remember last-used filter in the export dialog…
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 预期价值 · Expected value
      description: 这个建议如果实现了能带来什么？/ What does this unlock?
      placeholder: |
        例 / e.g.: 每次导出节省约 30 秒，每周 ~10 次 = 5 分钟/周
        e.g.: ~30s saved per export, ~10 exports/week = ~5 min/week
    validations:
      required: false

  - type: dropdown
    id: user_priority
    attributes:
      label: 你认为的优先级 · Your perceived priority
      description: 仅供参考，最终由团队评估 / For reference only; final decision is the team's
      options:
        - "高 · High"
        - "中 · Medium"
        - "低 · Low"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: 你使用的 ZCode 版本 / 环境 · ZCode version / environment
      placeholder: "e.g.: v1.2.3 / Web / iOS 17"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 补充材料 · Additional context
      description: 截图、参考产品、相关链接等 / Screenshots, references, links
      placeholder: 拖拽图片到此处上传 / Drag-drop images here
    validations:
      required: false
