name: 🐛 Bug 反馈 · Bug Report
description: 报告 ZCode 的缺陷或异常 · Report a defect or unexpected behavior
title: "[Bug] "
labels: ["type: Bug", "status: 待评估"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你帮我们发现问题！信息越完整，定位越快。
        Thanks for helping us find issues — the more detail, the faster the fix.

  - type: checkboxes
    id: prechecks
    attributes:
      label: 提交前确认 · Pre-submission checklist
      options:
        - label: 我已搜索过现有 issue，确认这不是重复 / I searched existing issues and confirmed this isn't a duplicate.
          required: true
        - label: 我已阅读 [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) / I've read CONTRIBUTING.md.
          required: true

  - type: dropdown
    id: category
    attributes:
      label: 问题类别 · Category
      options:
        - "UI / 界面体验 · UI / UX"
        - "性能 · Performance"
        - "稳定性 / 崩溃 · Stability / Crash"
        - "对话 / Agent 交互 · Agent chat"
        - "工具调用 / MCP · Tool use / MCP"
        - "文件 / 项目操作 · File / Project ops"
        - "模型设置 / 切换 · Model config"
        - "账号 / 登录 · Account / Login"
        - "计费 / 配额 · Billing / Quota"
        - "文档 / 教程 · Docs"
        - "其他 / 不确定 · Other / Not sure"
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: 涉及的 Agent 框架 · Agent framework
      description: Bug 出现在哪个框架里？/ Which framework exhibits the bug?
      options:
        - "ZCode Agent（自研）"
        - "Claude Code"
        - "Codex"
        - "opencode"
        - "Gemini CLI"
        - "多个 / 通用 · Multiple / General"
        - "不涉及框架 · Not framework-specific"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度 · Severity
      options:
        - "阻塞使用 · Blocking (无法使用核心功能 / core function unusable)"
        - "影响体验 · Major (功能可用但体验受损 / works but degraded)"
        - "轻微 · Minor (小问题不影响主流程 / minor, no impact on main flow)"
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 复现频率 · Reproducibility
      options:
        - "必现 · Always"
        - "偶现 · Sometimes"
        - "仅一次 · Once"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题描述 · Description
      placeholder: "例 / e.g.: 点击 X 按钮后页面白屏 / Page goes blank after clicking X"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 · Steps to reproduce
      description: 一步一步说明如何重现 / Numbered steps to reproduce
      placeholder: |
        1. 打开 ZCode / Open ZCode
        2. 进入 X 页面 / Go to page X
        3. 点击 Y 按钮 / Click button Y
        4. 看到…… / See…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望表现 · Expected behavior
      placeholder: 应该…… / Should…
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际表现 · Actual behavior
      placeholder: 实际…… / Actually…
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ZCode 版本 · ZCode version
      placeholder: "e.g.: v1.2.3"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: 设备 / 系统 / 浏览器 · Device / OS / Browser
      placeholder: "e.g.: iPhone 15 / iOS 17 / Safari 17"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 截图 / 录屏 / 日志 · Screenshots / Recordings / Logs
      description: 强烈建议提供 / Strongly recommended
    validations:
      required: false
